<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moji paketi – DevExpress</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/moji-paketi.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">DevExpress</a>
      <nav class="nav">
        <span class="nav-user" id="nav-user"></span>
        <a href="posalji.html">Pošalji paket</a>
        <a href="moji-paketi.html" class="nav-active">Moji paketi</a>
        <a href="profil.html">Profil</a>
        <a href="#" id="nav-logout">Odjavi se</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="paketi-section">
      <h1>Moji paketi</h1>
      <p class="paketi-intro">Pregled paketa koje ste poslali i paketa koji su poslati vama.</p>

      <div class="tabs">
        <button type="button" id="tab-poslati" class="tab-btn active">Poslati</button>
        <button type="button" id="tab-primljeni" class="tab-btn">Primljeni</button>
      </div>

      <div id="loading" class="loading hidden">Učitavanje…</div>
      <div id="error-msg" class="form-message error hidden"></div>

      <div id="panel-poslati" class="panel active">
        <div id="list-poslati" class="paketi-list"></div>
        <p id="empty-poslati" class="empty-msg hidden">Nema poslatih paketa.</p>
      </div>
      <div id="panel-primljeni" class="panel">
        <div id="list-primljeni" class="paketi-list"></div>
        <p id="empty-primljeni" class="empty-msg hidden">Nema primljenih paketa.</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <a href="index.html">Početna</a>
      <a href="posalji.html">Pošalji paket</a>
      <a href="auth.html?mode=login">Prijava</a>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/authFetch.js"></script>
  <script src="js/moji-paketi.js"></script>
</body>
</html>
